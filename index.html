<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedro Neves | > Economist and Software Engineer</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@500&family=Inter:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00ff88;
      --accent: #4fffcd;
      --text: #ffffff;
      --muted: #ffffff;
      --bg: #0c0c0c;
      --panel: #1a1a1a;
    }
    body.light {
      --bg: #f3f6fa;
      --text: #222831;
      --panel: #fff;
      --primary: #1a237e;
      --accent: #1976d2;
      --muted: #1976d2;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      cursor: url('https://cdn-icons-png.flaticon.com/512/32/32355.png'), auto;
    }
    canvas.matrix {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .controls {
      position: fixed;
      top: 1rem;
      right: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      z-index: 100;
    }
    .controls button {
      background: var(--panel);
      border: 1px solid var(--primary);
      border-radius: 4px;
      padding: 0.5rem 1rem;
      font-family: 'Fira Code', monospace;
      font-size: 0.85rem;
      color: var(--primary);
      cursor: pointer;
      transition: background 0.3s, color 0.3s;
    }
    .controls button:hover {
      background-color: var(--primary);
      color: #fff;
    }
    header {
      text-align: center;
      padding: 4rem 1rem 2rem;
      position: relative;
      z-index: 10;
    }
    .profile-img {
      width: 400px;
      height: 400px;
      margin: 0 auto;
      background: url('images/Perfil.jpg') center/contain no-repeat;
      background-color: transparent;
      position: relative;
      border-radius: 50%;
      transition: all 0.4s ease;
      z-index: 1;
    }
    .shape-circle { border-radius: 50%; }
    .shape-square { border-radius: 0%; }
    .shape-rectangle { width: 400px; height: 300px; border-radius: 15px; }
    .shape-monitor {
      clip-path: polygon(0 0, 100% 0, 100% 85%, 65% 85%, 60% 100%, 40% 100%, 35% 85%, 0 85%);
      border-radius: 0;
    }
    h1 {
      font-size: 4rem;
      font-weight: 700;
      margin-top: 1.5rem;
      position: relative;
      z-index: 2;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      transition: background-position 0.5s;
      background-size: 200% auto;
    }
    h1:hover {
      background-position: right center;
    }
    .subtitle-text {
      font-size: 1.3rem;
      font-family: 'Fira Code', monospace;
      margin-top: 0.5rem;
    }
    .terminal-cursor {
      animation: blink 2s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .description {
      max-width: 600px;
      margin: 1rem auto;
      font-size: 0.95rem;
      color: var(--muted);
      font-family: 'Fira Code', monospace;
      min-height: 1.5em;
    }
    .stats {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 2rem;
      margin: 2rem 0;
    }
    .stat {
      background-color: var(--panel);
      padding: 1rem 1.5rem;
      border-radius: 10px;
      min-width: 140px;
    }
    .stat h3 {
      font-size: 1.8rem;
      color: var(--primary);
      font-family: 'Fira Code', monospace;
    }
    .plus-sign {
      display: inline-block;
      animation: rotate 4s linear infinite;
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .stat p {
      color: var(--muted);
      font-size: 0.9rem;
    }
    .btn-group {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin: 2rem 0;
      flex-wrap: wrap;
    }
    .btn-group a {
      font-family: 'Fira Code', monospace;
      padding: 0.8rem 1.4rem;
      background: #fff;
      color: #000;
      text-decoration: none;
      border-radius: 0px;
      border: 2px solid #000;
      transition: all 0.3s ease;
    }
    .btn-group a:hover {
      transform: translateY(-3px);
      border-color: var(--primary);
    }
    .terminal-chat {
      max-width: 1000px;
      max-height: 1000px;
      margin: 1rem auto;
      background: var(--panel);
      padding: 3rem;
      border-radius: 8px;
      font-family: 'Fira Code', monospace;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }
    .terminal-line {
      text-align: left;
      margin-bottom: 1rem;
    }
    .terminal-line::before {
      content: "> ";
      color: var(--primary);
    }
    .terminal-input-container {
      display: flex;
      align-items: center;
      gap: 0.2rem;
      margin-left: 0;
      padding-left: 0;
    }
    .terminal-prompt {
      color: var(--primary);
      font-family: 'Fira Code', monospace;
      font-size: 1rem;
      margin-right: 0.2rem;
    }
    .terminal-input {
      background: transparent;
      border: none;
      color: var(--text);
      font-family: 'Fira Code', monospace;
      font-size: 1rem;
      outline: none;
      width: auto;
      min-width: 20ch;
      flex: none;
      caret-color: var(--primary);
    }
    .terminal-input::placeholder {
      color: var(--text);
      opacity: 0.7;
    }
    .terminal-example {
      color: var(--text);
      opacity: 0.8;
      font-family: 'Fira Code', monospace;
      margin-left: 0.5rem;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <canvas class="matrix"></canvas>
  <div class="controls">
    <button onclick="toggleTheme()">Theme</button>
    <button onclick="cycleShape()">Shape</button>
    <button onclick="toggleImage()">Image</button>
  </div>
  <header>
    <div class="profile-img shape-circle" id="profileImg"></div>
    <h1>Pedro Neves</h1>
    <div class="subtitle-text">> Economist and Software Engineer<span class="terminal-cursor">_</span></div>
    <p class="description" id="typingDesc"></p>

    <div class="stats" style="margin: 4rem 0;">
      <div class="stat"><h3 id="years">6<span class="plus-sign">+</span></h3><p>Years of experience</p></div>
      <div class="stat"><h3 id="projects">60<span class="plus-sign">+</span></h3><p>Projects Completed</p></div>
      <div class="stat"><h3 id="opensource">12<span class="plus-sign">+</span></h3><p>OpenSource Libraries</p></div>
      <div class="stat"><h3 id="customers">50<span class="plus-sign">+</span></h3><p>Happy Customers</p></div>
    </div>

    <div class="btn-group" style="margin: 5rem 0;">
      <a href="html/cv.html">Download Resume</a>
      <a href="html/analysis.html">Go to Analysis</a>
      <a href="html/projects.html">Projects</a>
    </div>

    <div class="terminal-chat">
      <div class="terminal-line">Type a command:</div>
      <div class="terminal-input-container">
        <span class="terminal-prompt">&gt;</span>
        <input class="terminal-input" type="text" id="terminalInput" placeholder="e.g. resume, projects, analysis" onkeypress="handleTerminal(event)" autocomplete="off" />
      </div>
    </div>
  </header>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script>
    const shapes = ['shape-circle', 'shape-square', 'shape-rectangle', 'shape-monitor'];
    let currentShape = 0;
    function cycleShape() {
      const img = document.getElementById('profileImg');
      shapes.forEach(shape => img.classList.remove(shape));
      currentShape = (currentShape + 1) % shapes.length;
      img.classList.add(shapes[currentShape]);
    }

    let showingAlt = false;
    function toggleImage() {
      const img = document.getElementById('profileImg');
      if (document.body.classList.contains('light')) {
        img.style.backgroundImage = "url('images/perfil_prof.png')";
        showingAlt = false;
      } else {
        img.style.backgroundImage = showingAlt
          ? "url('images/Perfil.jpg')"
          : "url('images/perfil3.png')";
        showingAlt = !showingAlt;
      }
    }

    function animateType(id, text, delay) {
      let el = document.getElementById(id);
      let i = 0;
      const interval = setInterval(() => {
        el.textContent += text[i];
        i++;
        if (i >= text.length) clearInterval(interval);
      }, delay);
    }

    function handleTerminal(e) {
      if (e.key === 'Enter') {
        const cmd = e.target.value.toLowerCase();
        if (cmd === 'help') {
          typeHelpText();
          e.target.value = '';
          return;
        }
        if (cmd.includes('resume')) window.location.href = 'html/cv.html';
        else if (cmd.includes('project')) window.location.href = 'html/projects.html';
        else if (cmd.includes('analysis')) window.location.href = 'html/analysis.html';
        else alert('Unknown command');
        e.target.value = '';
      }
    }

    function typeHelpText() {
      const chat = document.querySelector('.terminal-chat');
      let helpBox = document.getElementById('helpBox');
      const helpText = `\nComandos disponíveis:\n\nhelp - Mostra esta mensagem de ajuda\nresume - Baixa o currículo\nprojects - Vai para a página de projetos\nanalysis - Vai para a página de análises\n\nDigite um dos comandos acima e pressione Enter.`;
      if (!helpBox) {
        helpBox = document.createElement('div');
        helpBox.id = 'helpBox';
        helpBox.style.background = 'rgba(0,0,0,0.95)';
        helpBox.style.color = '#00ff88';
        helpBox.style.fontFamily = "'Fira Code', monospace";
        helpBox.style.padding = '1.5rem';
        helpBox.style.margin = '1rem 0';
        helpBox.style.borderRadius = '8px';
        helpBox.style.fontSize = '1rem';
        helpBox.style.whiteSpace = 'pre-line';
        helpBox.style.border = '1px solid #222';
        chat.appendChild(helpBox);
      }
      helpBox.innerHTML = '';
      let i = 0;
      function typeChar() {
        helpBox.innerHTML += helpText[i] === '\n' ? '<br>' : helpText[i];
        i++;
        if (i < helpText.length) {
          setTimeout(typeChar, 8); // super rápido
        }
      }
      typeChar();
      helpBox.scrollIntoView({behavior: 'smooth'});
    }

    function animateCount(element, target, duration) {
      let start = 0;
      const increment = target / (duration / 16); // 60fps
      const updateCount = () => {
        start += increment;
        if (start < target) {
          element.innerHTML = Math.floor(start) + '<span class="plus-sign">+</span>';
          requestAnimationFrame(updateCount);
        } else {
          element.innerHTML = target + '<span class="plus-sign">+</span>';
        }
      };
      updateCount();
    }

    function toggleTheme() {
      document.body.classList.toggle('light');
      const img = document.getElementById('profileImg');
      if (document.body.classList.contains('light')) {
        img.style.backgroundImage = "url('images/perfil_prof.png')";
        document.querySelector('canvas.matrix').style.display = 'none';
      } else {
        img.style.backgroundImage = "url('images/Perfil.jpg')";
        document.querySelector('canvas.matrix').style.display = 'block';
      }
    }

    window.onload = () => {
      animateType("typingDesc", "Focused on building meaningful digital solutions that solve real problems using data, design and logic.", 20);
      
      // Animações de contagem para os números
      animateCount(document.getElementById("years"), 6, 14000);
      animateCount(document.getElementById("projects"), 60, 14000);
      animateCount(document.getElementById("opensource"), 12, 14000);
      animateCount(document.getElementById("customers"), 50, 14000);

      const canvas = document.querySelector("canvas.matrix");
      const ctx = canvas.getContext("2d");
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const letters = "アカサタナハマヤラワ0123456789ΓΩπΣΨЖΩФ@#$%&";
      const fontSize = 16;
      const columns = canvas.width / fontSize;
      const drops = Array(Math.floor(columns)).fill(1);

      function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#00ff88";
        ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
          const text = letters[Math.floor(Math.random() * letters.length)];
          ctx.fillText(text, i * fontSize, drops[i] * fontSize);
          if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
          drops[i]++;
        }
      }
      setInterval(drawMatrix, 33);

      // Garante que ao carregar o tema claro já use a imagem profissional
      if (document.body.classList.contains('light')) {
        document.getElementById('profileImg').style.backgroundImage = "url('images/perfil_prof.png')";
        document.querySelector('canvas.matrix').style.display = 'none';
      } else {
        document.querySelector('canvas.matrix').style.display = 'block';
      }
    }
  </script>
</body>
</html>
